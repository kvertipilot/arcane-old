- type: entity
  parent: VendingMachine
  id: VendingMachineLove
  name: LoveMate
  description: A wide selection of toys for you!
  components:
  - type: VendingMachine
    pack: LoveMateInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    denyState: deny-unshaded
  - type: SpeakOnUIClosed
    pack: GenericVendGoodbyes
  - type: Sprite
    sprite: _Arcane/Structures/Machines/VendingMachines/lovemate.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 2
    energy: 1.6
    color: "#d64bc3"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
  - type: Tag
    tags:
      - DroneUsable # Goobstation
  # Orion-Start
  - type: VendingMachinePricing
    defaultPrice: 35
    extraPrice: 100
  # Orion-End
